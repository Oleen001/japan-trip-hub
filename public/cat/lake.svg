  <path d="M5 16 C8 16.7 14 16.7 17 16" stroke="#eaf1f7" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M7.5 18.6 C9.5 19.1 12.5 19.1 14.5 18.6" stroke="#eaf1f7" stroke-width="0.9" stroke-linecap="round"/>
