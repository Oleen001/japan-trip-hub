  <!-- snow cap -->
  <path d="M8.3 6 C9.6 4 10.4 3 11 3 C11.6 3 12.5 4.3 13.7 6.3 C12.9 5.7 12.1 6.3 11.3 5.8 C10.6 6.3 9.4 5.6 8.3 6 Z" fill="#ffffff"/>
  <!-- water band divider -->
